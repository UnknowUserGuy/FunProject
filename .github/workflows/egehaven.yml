name: Egehaven boligovervaagning

on:
  schedule:
    - cron: "*/10 * * * *"   # boligtjek hvert 10. minut (UTC)
    - cron: "0 * * * *"      # oprydning en gang i timen (UTC)
  workflow_dispatch: {}        # giver en "Run workflow"-knap til manuel test

permissions:
  contents: write              # saa den maa gemme state-filen tilbage i repoet

concurrency:
  group: egehaven
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    # Koer paa 10-min-skemaet og ved manuel koersel - men IKKE paa time-skemaet
    if: github.event_name != 'schedule' || github.event.schedule == '*/10 * * * *'
    steps:
      - name: Hent repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Opsaet Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cache Playwright-browser (hurtigere koersler)
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}

      - name: Installer afhaengigheder + Chromium
        run: |
          npm install
          npx playwright install --with-deps chromium

      - name: Tjek boligstatus
        env:
          EGEHAVEN_URL: ${{ secrets.EGEHAVEN_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node egehaven-auto.js --once

      - name: Gem state hvis den er aendret
        run: |
          if [ ! -f egehaven-state.json ]; then
            echo "Ingen state-fil - intet at gemme."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          for i in 1 2 3 4 5; do
            # Behold vores friske state, men stil os ellers paa nyeste remote:
            cp egehaven-state.json /tmp/state.json
            git fetch origin "${GITHUB_REF_NAME}"
            git reset --hard "origin/${GITHUB_REF_NAME}"
            cp /tmp/state.json egehaven-state.json
            if [ -z "$(git status --porcelain egehaven-state.json)" ]; then
              echo "Ingen aendring i state - intet at gemme."
              exit 0
            fi
            git add egehaven-state.json
            git commit -m "Opdater boligstatus $(date -u +%FT%TZ)"
            if git push; then
              echo "State gemt."
              exit 0
            fi
            echo "Push afvist - henter nyeste og proever igen ($i)..."
            sleep 5
          done
          echo "Kunne ikke pushe efter 5 forsoeg."
          exit 1

  cleanup:
    runs-on: ubuntu-latest
    # Koer kun paa time-skemaet (og ved manuel koersel)
    if: github.event_name != 'schedule' || github.event.schedule == '0 * * * *'
    permissions:
      actions: write           # noedvendigt for at slette gamle koersler
    steps:
      - name: Ryd op i koersler aeldre end 1 dag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          CUTOFF=$(date -d '1 day ago' +%s)
          gh run list --repo "$GITHUB_REPOSITORY" --limit 1000 \
            --json databaseId,createdAt \
            --jq ".[] | select((.createdAt | fromdateiso8601) < $CUTOFF) | .databaseId" \
          | xargs -r -I{} gh run delete {} --repo "$GITHUB_REPOSITORY"
